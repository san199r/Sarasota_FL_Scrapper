name: Sarasota Probate Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Once a day at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cleanup Previous Run Output
        # Ensures that we only email and commit the FRESH data from today's run.
        run: rm -f Sarasota_FL_Probate_Output_*.xlsx

      - name: Run Scraper
        run: |
          python Sarasota_FL_Probate_DateRange_Tool.py

      - name: Send Email with Results
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: "${{ secrets.MAIL_USERNAME }}"
          password: "${{ secrets.MAIL_PASSWORD }}"
          subject: "Sarasota Probate Scraper Results - ${{ github.run_id }}"
          body: "The Sarasota Probate Scraper has completed successfully. Please find the latest results attached."
          to: "${{ secrets.MAIL_USERNAME }}"
          from: "Scraper Bot"
          attachments: "Sarasota_FL_Probate_Output_*.xlsx"
